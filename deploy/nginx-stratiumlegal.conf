# ============================================================
#  stratiumlegal.com — Nginx
#  Sitio estático Next.js (export) con next-intl (es/en/cn/in)
#
#  Coloca este bloque en /etc/nginx/sites-available/ y enlázalo a
#  sites-enabled/. Sube el contenido de out/ a /var/www/stratiumlegal.
#  Recarga con:  sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name stratiumlegal.com www.stratiumlegal.com;

    # Raíz donde subiste el contenido de out/
    root /var/www/stratiumlegal;
    index index.html;

    # --- Raíz "/" -> "/es/" (next-intl localePrefix: always) ---
    location = / {
        return 302 /es/;
    }

    # --- API exportada sin extensión (archivos "editions" / "hero") ---
    # El export genera archivos "editions" y "hero" sin barra final.
    location = /api/dof/editions/ { try_files /api/dof/editions =404; }
    location = /api/dof/hero/     { try_files /api/dof/hero =404; }

    # --- Rutas con trailing slash -> sirve el index.html de la carpeta ---
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # --- Página 404 personalizada ---
    error_page 404 /404.html;

    # --- Caché de assets versionados de Next.js (inmutables) ---
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|avif|mp4|m4a|mp3|glb|gltf|bin|hdr|exr|ktx2|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- HTML sin caché agresiva (refleja despliegues) ---
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # --- Compresión ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml application/wasm font/ttf
               font/woff font/woff2;

    # --- MIME extra ---
    types {
        application/wasm           wasm;
        model/gltf-binary          glb;
        model/gltf+json            gltf;
        application/manifest+json  webmanifest;
    }
}

# ============================================================
#  HTTPS: tras subir, instala el certificado con:
#     sudo certbot --nginx -d stratiumlegal.com -d www.stratiumlegal.com
#  Certbot añadirá automáticamente el bloque listen 443 + redirección.
# ============================================================
